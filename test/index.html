<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyncChord — 코드 분석</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e1e1e1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .header {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 16px; width: 100%; max-width: 960px;
    }
    h1 {
      font-size: 1.5rem;
      background: linear-gradient(135deg, #ff6b35, #f7c948);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-sub { color: #888; font-size: 0.85rem; }

    /* ── 입력 영역 ── */
    .input-section {
      width: 100%; max-width: 960px;
      margin-bottom: 16px;
    }
    .tab-bar {
      display: flex; gap: 0; margin-bottom: 0;
    }
    .tab-btn {
      padding: 10px 20px; border: 1px solid #3a3a5a;
      background: #1a1a2e; color: #888; cursor: pointer;
      font-size: 0.85rem; font-weight: 600;
      border-bottom: none;
    }
    .tab-btn:first-child { border-radius: 8px 0 0 0; }
    .tab-btn:last-child { border-radius: 0 8px 0 0; }
    .tab-btn.active { background: #16161e; color: #ff6b35; border-bottom-color: #16161e; }
    .tab-content {
      background: #16161e; border: 1px solid #3a3a5a;
      border-radius: 0 8px 8px 8px; padding: 16px;
      display: none;
    }
    .tab-content.active { display: block; }

    /* 파일 업로드 */
    .file-drop {
      border: 2px dashed #3a3a5a; border-radius: 8px;
      padding: 30px; text-align: center; cursor: pointer;
      transition: all 0.2s; color: #666;
    }
    .file-drop:hover, .file-drop.dragover {
      border-color: #ff6b35; color: #ff6b35; background: rgba(255,107,53,0.05);
    }
    .file-drop .icon { font-size: 2rem; margin-bottom: 8px; }
    .file-drop input { display: none; }

    /* 유튜브 */
    .url-bar {
      display: flex; gap: 8px; margin-bottom: 10px;
    }
    .url-bar input {
      flex: 1; padding: 10px 14px; border-radius: 8px;
      border: 1px solid #3a3a5a; background: #1a1a2e;
      color: #e1e1e1; font-size: 0.9rem;
    }
    .url-bar input::placeholder { color: #666; }
    .presets { display: flex; gap: 6px; flex-wrap: wrap; }
    .preset-btn {
      padding: 5px 12px; font-size: 0.75rem; border-radius: 14px;
      background: #111; border: 1px solid #2a2a4a; color: #aaa; cursor: pointer;
    }
    .preset-btn:hover { border-color: #ff6b35; color: #ff6b35; }

    /* ── 플레이어 / 오디오 ── */
    .player-wrapper {
      position: relative; width: 100%; max-width: 960px;
      background: #000; border-radius: 12px 12px 0 0; overflow: hidden;
      min-height: 80px;
    }
    .player-wrapper iframe { width: 100%; height: 100%; border: none; aspect-ratio: 16/9; }
    .player-wrapper.audio-mode {
      display: flex; align-items: center; justify-content: center;
      padding: 16px; gap: 12px; min-height: 80px; aspect-ratio: unset;
    }
    .player-wrapper audio { width: 100%; max-width: 600px; }
    .placeholder {
      width: 100%; padding: 60px 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #555; gap: 12px;
    }
    .placeholder-icon { font-size: 3rem; }

    /* ── 분석 진행 바 ── */
    .analysis-progress {
      width: 100%; max-width: 960px;
      display: none; margin-bottom: 8px;
    }
    .analysis-progress.active { display: block; }
    .progress-bar {
      height: 6px; background: #2a2a4a; border-radius: 3px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, #ff6b35, #f7c948);
      width: 0%; transition: width 0.3s;
    }
    .progress-label {
      font-size: 0.75rem; color: #888; margin-top: 4px; text-align: center;
    }

    /* ── 타임라인 ── */
    .chord-timeline-wrapper {
      width: 100%; max-width: 960px;
      background: #111118; border: 1px solid #2a2a4a;
      border-top: none; border-radius: 0 0 12px 12px;
      overflow: hidden;
    }
    .chord-info-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; background: #16161e; border-bottom: 1px solid #222;
    }
    .chord-now { display: flex; align-items: center; gap: 12px; }
    .chord-now-label {
      font-size: 2rem; font-weight: 800;
      background: linear-gradient(135deg, #ff6b35, #f7c948);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      min-width: 80px; text-align: center; line-height: 1;
    }
    .chord-now-conf {
      height: 4px; width: 80px; background: #2a2a4a; border-radius: 2px; overflow: hidden;
    }
    .chord-now-conf-fill {
      height: 100%; background: linear-gradient(90deg, #ff6b35, #f7c948);
      width: 0%; transition: width 0.2s;
    }
    .chord-now-meta { display: flex; flex-direction: column; gap: 2px; }
    .chord-now-meta span { font-size: 0.65rem; color: #666; }
    .bpm-label { font-size: 0.9rem; font-weight: 700; color: #f7c948; }
    .bpm-label small { font-weight: 400; color: #888; }

    .timeline-container {
      position: relative; height: 80px; overflow: hidden; user-select: none;
    }
    .timeline-track {
      display: flex; height: 100%; position: absolute; top: 0; left: 0;
      transition: transform 0.15s ease-out;
    }
    .playhead {
      position: absolute; top: 0; bottom: 0; left: 25%;
      width: 3px; background: #ff6b35; z-index: 10;
      box-shadow: 0 0 8px rgba(255,107,53,0.6);
    }
    .playhead::before {
      content: ''; position: absolute; top: -4px; left: -5px;
      border-left: 6px solid transparent; border-right: 6px solid transparent;
      border-top: 6px solid #ff6b35;
    }

    .chord-block {
      height: 100%; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-weight: 700; font-size: 1rem; color: #bbb;
      border-right: 1px solid rgba(255,255,255,0.06);
      position: relative; transition: background 0.15s;
    }
    .chord-block.bar-start { border-left: 2px solid rgba(255,255,255,0.18); }
    .chord-block .chord-label {
      z-index: 2; position: relative; padding: 3px 6px; border-radius: 4px;
      background: rgba(0,0,0,0.25); white-space: nowrap;
    }
    .chord-block .chord-label.continuation { font-size: 0.7rem; opacity: 0.35; background: none; }
    .chord-block.past { opacity: 0.45; }
    .chord-block.current { opacity: 1; background: rgba(255,107,53,0.08); }
    .chord-block.current .chord-label {
      background: rgba(255,107,53,0.3); color: #fff; font-size: 1.15rem;
      box-shadow: 0 0 10px rgba(255,107,53,0.2);
    }
    .chord-block.future { opacity: 0.55; }
    .chord-block.future-empty { opacity: 0.25; }

    .chord-block::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    }
    .chord-block[data-root="C"]::before { background: #4ade80; }
    .chord-block[data-root="C#"]::before,.chord-block[data-root="Db"]::before { background: #22d3ee; }
    .chord-block[data-root="D"]::before { background: #60a5fa; }
    .chord-block[data-root="D#"]::before,.chord-block[data-root="Eb"]::before { background: #818cf8; }
    .chord-block[data-root="E"]::before { background: #a78bfa; }
    .chord-block[data-root="F"]::before { background: #c084fc; }
    .chord-block[data-root="F#"]::before,.chord-block[data-root="Gb"]::before { background: #e879f9; }
    .chord-block[data-root="G"]::before { background: #f472b6; }
    .chord-block[data-root="G#"]::before,.chord-block[data-root="Ab"]::before { background: #fb7185; }
    .chord-block[data-root="A"]::before { background: #f97316; }
    .chord-block[data-root="A#"]::before,.chord-block[data-root="Bb"]::before { background: #f59e0b; }
    .chord-block[data-root="B"]::before { background: #84cc16; }
    .chord-block[data-root="-"]::before { background: #333; }

    .bar-numbers {
      display: flex; height: 18px; background: #0e0e14;
      border-top: 1px solid #222; font-size: 0.55rem; color: #555;
      overflow: hidden; position: relative;
    }
    .bar-num {
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      border-right: 1px solid rgba(255,255,255,0.04);
    }
    .bar-num.current { color: #ff6b35; font-weight: 700; }

    /* ── 하단 ── */
    .bottom-panel {
      width: 100%; max-width: 960px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px;
    }
    .panel-card {
      background: #1a1a2e; border: 1px solid #2a2a4a;
      border-radius: 12px; padding: 14px;
    }
    .panel-card h3 { font-size: 0.8rem; color: #f7c948; margin-bottom: 8px; }
    .ctrl-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    button {
      padding: 7px 12px; border-radius: 6px;
      border: 1px solid #3a3a5a; background: #2a2a4a;
      color: #e1e1e1; font-size: 0.8rem; cursor: pointer;
    }
    button:hover { border-color: #ff6b35; }
    button.primary {
      background: linear-gradient(135deg,#ff6b35,#e85d26);
      border-color: #ff6b35; color: #fff; font-weight: 600;
    }
    .status-row {
      display: flex; align-items: center; gap: 5px;
      margin-top: 8px; font-size: 0.7rem; color: #666;
    }
    .st-dot { width: 6px; height: 6px; border-radius: 50%; background: #555; }
    .st-dot.ok { background: #4ade80; }
    .st-dot.err { background: #f87171; }
    .log-box {
      background: #111; border-radius: 6px; padding: 8px;
      max-height: 200px; overflow-y: auto;
      font-family: 'SF Mono','Fira Code',monospace;
      font-size: 0.7rem; line-height: 1.5; color: #666;
    }
    .log-box .info { color: #4ade80; }
    .log-box .warn { color: #f7c948; }
    .log-box .error { color: #f87171; }
  </style>
</head>
<body>
  <div class="header">
    <h1>SyncChord</h1>
    <span class="header-sub">오프라인 코드 분석 (Chordify 방식) + 실시간 캡처</span>
  </div>

  <!-- 입력 탭 -->
  <div class="input-section">
    <div class="tab-bar">
      <div class="tab-btn active" data-tab="file">📁 오디오 파일</div>
      <div class="tab-btn" data-tab="youtube">▶ YouTube</div>
      <div class="tab-btn" data-tab="live">🎤 실시간</div>
    </div>
    <div class="tab-content active" id="tabFile">
      <div class="file-drop" id="fileDrop">
        <div class="icon">🎵</div>
        <div>MP3, WAV, OGG 파일을 드래그하거나 클릭해서 업로드</div>
        <div style="font-size:0.75rem;color:#555;margin-top:4px">전체 오디오를 오프라인 분석합니다 (Chordify 방식)</div>
        <input type="file" id="fileInput" accept="audio/*">
      </div>
    </div>
    <div class="tab-content" id="tabYoutube">
      <div class="url-bar">
        <input type="text" id="urlInput" placeholder="YouTube URL 붙여넣기">
        <button class="primary" id="btnLoad">▶ 로드</button>
      </div>
      <div class="presets">
        <button class="preset-btn" data-id="kl0rqqhCU_s">🎤 김범수 - 보고싶다</button>
        <button class="preset-btn" data-id="5qap5aO4i9A">🎸 lofi hip hop</button>
        <button class="preset-btn" data-id="YQHsXMglC9A">🎶 Adele - Hello</button>
      </div>
      <div style="font-size:0.7rem;color:#555;margin-top:8px">YouTube: "오디오 캡처" 필요 (실시간 분석)</div>
    </div>
    <div class="tab-content" id="tabLive">
      <div class="ctrl-row">
        <button class="primary" id="btnSystem">🔊 시스템 오디오 캡처</button>
        <button id="btnMic">🎤 마이크</button>
        <button id="btnStop" style="display:none">⏹ 중지</button>
      </div>
      <div style="font-size:0.7rem;color:#555;margin-top:8px">실시간 분석 (정확도 낮음 — 오프라인 분석 권장)</div>
    </div>
  </div>

  <!-- 플레이어 -->
  <div class="player-wrapper" id="playerWrapper">
    <div class="placeholder">
      <div class="placeholder-icon">🎸</div>
      <div>오디오 파일을 업로드하거나 YouTube URL을 입력하세요</div>
    </div>
  </div>

  <!-- 분석 진행 바 -->
  <div class="analysis-progress" id="analysisProgress">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">분석 준비 중...</div>
  </div>

  <!-- 타임라인 -->
  <div class="chord-timeline-wrapper">
    <div class="chord-info-bar">
      <div class="chord-now">
        <div class="chord-now-label" id="chordNowLabel">-</div>
        <div class="chord-now-meta">
          <span id="chordNowType">대기 중</span>
          <div class="chord-now-conf"><div class="chord-now-conf-fill" id="confFill"></div></div>
        </div>
      </div>
      <div class="bpm-label"><span id="bpmVal">-</span> <small>BPM</small></div>
    </div>
    <div class="timeline-container" id="timelineContainer">
      <div class="playhead"></div>
      <div class="timeline-track" id="timelineTrack"></div>
    </div>
    <div class="bar-numbers" id="barNumbers"></div>
  </div>

  <!-- 하단 -->
  <div class="bottom-panel">
    <div class="panel-card">
      <h3>🎛 설정</h3>
      <div class="ctrl-row">
        <span style="font-size:0.75rem;color:#888">BPM:</span>
        <button id="bpmDn">-5</button>
        <button id="bpmUp">+5</button>
        <button id="bpmAuto">자동</button>
      </div>
      <div class="status-row">
        <div class="st-dot" id="wasmDot"></div>
        <span id="wasmLabel">WASM 대기...</span>
      </div>
    </div>
    <div class="panel-card">
      <h3>📋 로그</h3>
      <div class="log-box" id="logBox"></div>
    </div>
  </div>

  <script src="./essentia/essentia-wasm.web.js"></script>

  <script type="module">
    import Essentia from './essentia/essentia.js-core.es.js';

    const logBox = document.getElementById('logBox');
    function log(msg, cls='info') {
      const t = new Date().toLocaleTimeString();
      logBox.innerHTML += `<div class="${cls}">[${t}] ${msg}</div>`;
      logBox.scrollTop = logBox.scrollHeight;
    }

    // ══════════════════════════════════════════════════════
    // Essentia.js WASM 초기화
    // ══════════════════════════════════════════════════════
    let essentia = null;
    let essentiaReady = false;
    const FRAME_SIZE = 4096;
    const HOP_SIZE = 2048;
    const HPCP_SIZE = 36;

    async function loadEssentia() {
      try {
        log('Essentia WASM 로딩 중...');
        const wasmModule = await EssentiaWASM();
        essentia = new Essentia(wasmModule, false);
        essentiaReady = true;
        window._essentia = essentia;
        document.getElementById('wasmDot').classList.add('ok');
        document.getElementById('wasmLabel').textContent = `Essentia ${essentia.version} 로드 완료`;
        log(`Essentia.js ${essentia.version} WASM 로드 성공`);
      } catch(e) {
        document.getElementById('wasmDot').classList.add('err');
        document.getElementById('wasmLabel').textContent = 'Essentia WASM 실패';
        log('Essentia WASM 로드 실패: ' + e.message, 'error');
      }
    }

    // ══════════════════════════════════════════════════════
    // 오프라인 분석 (Chordify 방식: 전체 오디오 → 일괄 분석)
    // ══════════════════════════════════════════════════════
    let offlineChords = []; // { time, chord, confidence }
    let offlineBPM = 72;
    let offlineBeatTimes = []; // 각 비트의 시간 (초)

    // 단일 프레임 HPCP 계산
    function computeHPCP(frame, sampleRate) {
      const toDelete = [];
      try {
        const inputVec = essentia.arrayToVector(frame);
        toDelete.push(inputVec);

        const windowed = essentia.Windowing(inputVec, true, FRAME_SIZE, 'hann', 0, true);
        toDelete.push(windowed.frame);

        const spectrum = essentia.Spectrum(windowed.frame, FRAME_SIZE);
        toDelete.push(spectrum.spectrum);

        const peaks = essentia.SpectralPeaks(spectrum.spectrum,
          0.00001, 5000, 60, 40, 'magnitude', sampleRate);
        toDelete.push(peaks.frequencies, peaks.magnitudes);

        const hpcp = essentia.HPCP(peaks.frequencies, peaks.magnitudes,
          true, 500, 0, 5000, false, 40, false, 'unitMax', 440, sampleRate,
          HPCP_SIZE, 'squaredCosine', 1);
        toDelete.push(hpcp.hpcp);

        return essentia.vectorToArray(hpcp.hpcp);
      } finally {
        for (const v of toDelete) { try { v.delete(); } catch(_){} }
      }
    }

    // HPCP 윈도우 평균 → Key 알고리즘
    function detectChordFromHPCPs(hpcpFrames) {
      const toDelete = [];
      try {
        const avg = new Float32Array(HPCP_SIZE);
        for (const f of hpcpFrames) {
          for (let i = 0; i < HPCP_SIZE; i++) avg[i] += f[i];
        }
        for (let i = 0; i < HPCP_SIZE; i++) avg[i] /= hpcpFrames.length;

        const avgVec = essentia.arrayToVector(avg);
        toDelete.push(avgVec);

        const result = essentia.Key(avgVec, 4, HPCP_SIZE, 'tonictriad', 0.6, false, false, false);
        const chord = result.scale === 'minor' ? result.key + 'm' : result.key;
        return { chord, confidence: result.strength };
      } finally {
        for (const v of toDelete) { try { v.delete(); } catch(_){} }
      }
    }

    // BPM 감지: Essentia의 PercivalBpmEstimator 또는 onset 기반
    function detectBPM(audioData, sampleRate) {
      const toDelete = [];
      try {
        // RhythmExtractor2013 사용 시도
        const inputVec = essentia.arrayToVector(audioData);
        toDelete.push(inputVec);

        try {
          const rhythm = essentia.PercivalBpmEstimator(inputVec,
            FRAME_SIZE, HOP_SIZE, 210, 50, sampleRate);
          if (rhythm.bpm > 30 && rhythm.bpm < 250) {
            return Math.round(rhythm.bpm);
          }
        } catch(e) {
          console.log('PercivalBpmEstimator not available, using onset method');
        }

        // 폴백: onset energy 기반
        return estimateBPMFromOnsets(audioData, sampleRate);
      } finally {
        for (const v of toDelete) { try { v.delete(); } catch(_){} }
      }
    }

    function estimateBPMFromOnsets(audioData, sampleRate) {
      // 간단한 에너지 기반 onset 감지
      const frameLen = 1024;
      const energies = [];
      for (let i = 0; i < audioData.length - frameLen; i += frameLen) {
        let e = 0;
        for (let j = 0; j < frameLen; j++) e += audioData[i + j] ** 2;
        energies.push(Math.sqrt(e / frameLen));
      }

      // onset 감지
      const onsets = [];
      const windowSize = 10;
      for (let i = windowSize; i < energies.length - 1; i++) {
        const localAvg = energies.slice(i - windowSize, i).reduce((a, b) => a + b) / windowSize;
        if (energies[i] > localAvg * 1.5 && energies[i] > energies[i - 1]) {
          const timeSec = (i * frameLen) / sampleRate;
          if (onsets.length === 0 || timeSec - onsets[onsets.length - 1] > 0.15) {
            onsets.push(timeSec);
          }
        }
      }

      if (onsets.length < 4) return 72;

      // IOI 히스토그램
      const iois = [];
      for (let i = 1; i < onsets.length; i++) {
        const dt = onsets[i] - onsets[i - 1];
        if (dt > 0.2 && dt < 2.0) iois.push(dt);
      }

      const hist = {};
      for (const dt of iois) {
        const bucket = Math.round(dt * 20) / 20; // 50ms 버킷
        hist[bucket] = (hist[bucket] || 0) + 1;
      }

      const sorted = Object.entries(hist).sort((a, b) => b[1] - a[1]);
      if (sorted.length === 0) return 72;

      let bpm = Math.round(60 / Number(sorted[0][0]));
      while (bpm < 50) bpm *= 2;
      while (bpm > 160) bpm /= 2;
      return Math.round(bpm);
    }

    // ★ 메인 오프라인 분석 함수
    async function analyzeOffline(audioBuffer) {
      if (!essentiaReady) {
        log('Essentia WASM 아직 로딩 중...', 'warn');
        return;
      }

      const sampleRate = audioBuffer.sampleRate;
      // 모노로 변환
      let audioData;
      if (audioBuffer.numberOfChannels > 1) {
        audioData = new Float32Array(audioBuffer.length);
        const ch0 = audioBuffer.getChannelData(0);
        const ch1 = audioBuffer.getChannelData(1);
        for (let i = 0; i < audioBuffer.length; i++) {
          audioData[i] = (ch0[i] + ch1[i]) / 2;
        }
      } else {
        audioData = audioBuffer.getChannelData(0);
      }

      const duration = audioBuffer.duration;
      log(`오디오: ${duration.toFixed(1)}초, ${sampleRate}Hz, ${audioBuffer.numberOfChannels}ch`);

      // 1단계: BPM 감지
      showProgress(5, 'BPM 감지 중...');
      log('BPM 감지 중...');

      // 처음 30초로 BPM 추정 (전체는 너무 오래 걸림)
      const bpmSamples = audioData.slice(0, Math.min(audioData.length, sampleRate * 30));
      offlineBPM = detectBPM(bpmSamples, sampleRate);
      document.getElementById('bpmVal').textContent = offlineBPM;
      log(`BPM 감지: ${offlineBPM}`);

      // 2단계: 전체 HPCP 계산
      showProgress(10, 'HPCP 계산 중...');
      log('전체 HPCP 계산 중...');

      const totalFrames = Math.floor((audioData.length - FRAME_SIZE) / HOP_SIZE);
      const allHPCPs = [];

      for (let i = 0; i < totalFrames; i++) {
        const start = i * HOP_SIZE;
        const frame = audioData.slice(start, start + FRAME_SIZE);
        if (frame.length < FRAME_SIZE) break;

        try {
          const hpcp = computeHPCP(frame, sampleRate);
          allHPCPs.push({ time: start / sampleRate, hpcp: Array.from(hpcp) });
        } catch(e) {
          // 스킵
        }

        // 진행률 업데이트 (10~80%)
        if (i % 50 === 0) {
          const pct = 10 + (i / totalFrames) * 70;
          showProgress(pct, `HPCP 계산: ${i}/${totalFrames} (${(pct).toFixed(0)}%)`);
          await new Promise(r => setTimeout(r, 0)); // UI 업데이트 허용
        }
      }

      log(`HPCP 프레임: ${allHPCPs.length}개`);

      // 3단계: 비트 그리드 생성
      showProgress(82, '비트 그리드 생성...');
      const beatInterval = 60 / offlineBPM;
      offlineBeatTimes = [];
      for (let t = 0; t < duration; t += beatInterval) {
        offlineBeatTimes.push(t);
      }

      // 4단계: 비트별 코드 감지 (ChordsDetection 방식: 비트 주변 ~1초 HPCP 평균)
      showProgress(85, '코드 감지 중...');
      log('비트별 코드 감지 중...');
      offlineChords = [];

      const chordWindowSec = 1.0; // ChordsDetection 윈도우 (초)

      for (let bi = 0; bi < offlineBeatTimes.length; bi++) {
        const beatTime = offlineBeatTimes[bi];
        const windowStart = beatTime - chordWindowSec / 2;
        const windowEnd = beatTime + chordWindowSec / 2;

        // 이 윈도우에 해당하는 HPCP 프레임 수집
        const windowFrames = allHPCPs.filter(h =>
          h.time >= windowStart && h.time < windowEnd
        ).map(h => h.hpcp);

        if (windowFrames.length >= 2) {
          try {
            const result = detectChordFromHPCPs(windowFrames);
            offlineChords.push({
              time: beatTime,
              chord: result.chord,
              confidence: result.confidence
            });
          } catch(e) {
            offlineChords.push({ time: beatTime, chord: '-', confidence: 0 });
          }
        } else {
          offlineChords.push({ time: beatTime, chord: '-', confidence: 0 });
        }

        if (bi % 20 === 0) {
          const pct = 85 + (bi / offlineBeatTimes.length) * 14;
          showProgress(pct, `코드 감지: ${bi}/${offlineBeatTimes.length}`);
          await new Promise(r => setTimeout(r, 0));
        }
      }

      showProgress(100, '분석 완료!');
      log(`분석 완료: ${offlineChords.length}개 비트, ${offlineBPM} BPM`);

      // 결과 로그 (처음 16비트)
      const preview = offlineChords.slice(0, 16).map(c => c.chord).join(' | ');
      log(`처음 4마디: ${preview}`);

      // 타임라인 빌드 및 재생 준비
      buildOfflineTimeline();
    }

    function showProgress(pct, label) {
      const el = document.getElementById('analysisProgress');
      el.classList.add('active');
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressLabel').textContent = label;
      if (pct >= 100) setTimeout(() => el.classList.remove('active'), 2000);
    }

    // ══════════════════════════════════════════════════════
    // 오프라인 타임라인 + 재생 싱크
    // ══════════════════════════════════════════════════════
    let currentBeatIdx = 0;
    let audioElement = null;
    let playbackRAF = null;

    function buildOfflineTimeline() {
      // 초기 렌더
      renderOfflineTimeline(0);
    }

    function chordRoot(name) {
      if (!name || name === '-' || name === 'N/C') return '-';
      const m = name.match(/^([A-G][b#]?)/);
      return m ? m[1] : '-';
    }

    const BEAT_W = 56;
    const PLAYHEAD_PCT = 0.25;
    const BEATS_PER_BAR = 4;

    function renderOfflineTimeline(currentTime) {
      const track = document.getElementById('timelineTrack');
      const container = document.getElementById('timelineContainer');
      const barRow = document.getElementById('barNumbers');
      const containerW = container.clientWidth;

      // 현재 비트 인덱스 찾기
      let beatIdx = 0;
      for (let i = 0; i < offlineChords.length; i++) {
        if (offlineChords[i].time <= currentTime) beatIdx = i;
        else break;
      }
      currentBeatIdx = beatIdx;

      const totalBeats = offlineChords.length;
      if (totalBeats === 0) return;

      // 가시 범위 계산
      const visibleBeats = Math.ceil(containerW / BEAT_W) + 8;
      const startBeat = Math.max(0, beatIdx - Math.ceil(visibleBeats * PLAYHEAD_PCT));
      const endBeat = Math.min(totalBeats, startBeat + visibleBeats);

      let html = '';
      for (let i = startBeat; i < endBeat; i++) {
        const c = offlineChords[i];
        const beatInBar = i % BEATS_PER_BAR;
        const isBarStart = beatInBar === 0;
        const isCurrent = i === beatIdx;
        const isPast = i < beatIdx;

        let cls = isCurrent ? 'current' : isPast ? 'past' : 'future';
        if (isBarStart) cls += ' bar-start';

        const root = chordRoot(c.chord);
        const prevChord = i > startBeat ? offlineChords[i - 1]?.chord : null;
        const isContinuation = !isBarStart && c.chord === prevChord && !isCurrent;
        const label = isContinuation
          ? `<span class="chord-label continuation">─</span>`
          : `<span class="chord-label">${c.chord}</span>`;

        html += `<div class="chord-block ${cls}" data-root="${root}" style="width:${BEAT_W}px">${label}</div>`;
      }
      track.innerHTML = html;

      // 스크롤 위치
      const playheadX = containerW * PLAYHEAD_PCT;
      const beatOffset = beatIdx - startBeat;
      const currentCenter = (beatOffset + 0.5) * BEAT_W;
      track.style.transform = `translateX(${playheadX - currentCenter}px)`;

      // 마디 번호
      let barHtml = '';
      for (let i = startBeat; i < endBeat; i++) {
        const beatInBar = i % BEATS_PER_BAR;
        const barNum = Math.floor(i / BEATS_PER_BAR) + 1;
        const isCurr = i === beatIdx;
        const txt = beatInBar === 0 ? `<b>${barNum}</b>` : `${beatInBar + 1}`;
        barHtml += `<div class="bar-num ${isCurr ? 'current' : ''}" style="width:${BEAT_W}px">${txt}</div>`;
      }
      barRow.innerHTML = barHtml;
      barRow.style.transform = `translateX(${playheadX - currentCenter}px)`;
      barRow.style.width = `${(endBeat - startBeat) * BEAT_W}px`;

      // 현재 코드 표시
      const currentChord = offlineChords[beatIdx];
      if (currentChord) {
        document.getElementById('chordNowLabel').textContent = currentChord.chord;
        const conf = currentChord.confidence;
        document.getElementById('confFill').style.width = (conf * 100).toFixed(0) + '%';
        const beatInBar = beatIdx % BEATS_PER_BAR;
        const barNum = Math.floor(beatIdx / BEATS_PER_BAR) + 1;
        const type = currentChord.chord.endsWith('m') ? 'minor' :
                     currentChord.chord === '-' ? '' : 'major';
        document.getElementById('chordNowType').textContent =
          type ? `${type}  |  마디 ${barNum}  박 ${beatInBar + 1}  |  ${offlineBPM} BPM`
               : `마디 ${barNum}  |  ${offlineBPM} BPM`;
      }
    }

    // 재생 싱크 루프
    function playbackSync() {
      if (!audioElement || audioElement.paused) {
        playbackRAF = requestAnimationFrame(playbackSync);
        return;
      }
      renderOfflineTimeline(audioElement.currentTime);
      playbackRAF = requestAnimationFrame(playbackSync);
    }

    // ══════════════════════════════════════════════════════
    // 파일 업로드 처리
    // ══════════════════════════════════════════════════════
    function handleFile(file) {
      if (!file || !file.type.startsWith('audio/')) {
        log('오디오 파일만 업로드 가능합니다', 'error');
        return;
      }
      log(`파일 로드: ${file.name} (${(file.size / 1024 / 1024).toFixed(1)}MB)`);

      const wrapper = document.getElementById('playerWrapper');
      wrapper.className = 'player-wrapper audio-mode';

      // 오디오 엘리먼트 생성
      const url = URL.createObjectURL(file);
      wrapper.innerHTML = `<div style="text-align:center">
        <div style="font-size:1.2rem;font-weight:600;margin-bottom:8px">🎵 ${file.name}</div>
        <audio controls id="audioPlayer" style="width:100%;max-width:600px"></audio>
      </div>`;
      audioElement = document.getElementById('audioPlayer');
      audioElement.src = url;

      // AudioContext로 디코딩
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const actx = new AudioContext();
          const buffer = await actx.decodeAudioData(e.target.result);
          actx.close();
          log('오디오 디코딩 완료, 분석 시작...');
          await analyzeOffline(buffer);

          // 재생 싱크 시작
          if (playbackRAF) cancelAnimationFrame(playbackRAF);
          playbackSync();
        } catch(err) {
          log('오디오 디코딩 실패: ' + err.message, 'error');
        }
      };
      reader.readAsArrayBuffer(file);
    }

    // ══════════════════════════════════════════════════════
    // 실시간 분석 (기존 기능)
    // ══════════════════════════════════════════════════════
    let audioCtx, analyser, isAnalyzing = false;
    let captureStream = null;
    let hpcpBuf = [], stableChord = '-', stableCount = 0;
    let liveChord = '-', liveConf = 0;
    let beatTimeline = [], voteBuffer = [];
    let lastBeatTime = 0, liveBPM = 72;
    let energyHistory = [], onsetTimes = [], lastOnsetTime = 0;

    function essentiaChordDetectLive(timeDomainData, sampleRate) {
      if (!essentiaReady) return { chord: '-', confidence: 0 };
      const toDelete = [];
      try {
        const hpcp = computeHPCP(timeDomainData, sampleRate);
        hpcpBuf.push(Array.from(hpcp));
        if (hpcpBuf.length > 6) hpcpBuf.shift();

        const avg = new Float32Array(HPCP_SIZE);
        for (const f of hpcpBuf) for (let i = 0; i < HPCP_SIZE; i++) avg[i] += f[i];
        for (let i = 0; i < HPCP_SIZE; i++) avg[i] /= hpcpBuf.length;

        const avgVec = essentia.arrayToVector(avg);
        toDelete.push(avgVec);
        const result = essentia.Key(avgVec, 4, HPCP_SIZE, 'tonictriad', 0.6, false, false, false);
        const chord = result.scale === 'minor' ? result.key + 'm' : result.key;
        const conf = Math.max(0, Math.min(1, result.strength));

        if (chord !== stableChord) { stableCount++; if (stableCount < 2 && stableChord !== '-') return { chord: stableChord, confidence: conf * 0.85 }; stableChord = chord; stableCount = 0; }
        else stableCount = 0;
        return { chord, confidence: conf };
      } catch(e) { return { chord: '-', confidence: 0 }; }
      finally { for (const v of toDelete) { try { v.delete(); } catch(_){} } }
    }

    function doLiveAnalysis() {
      if (!isAnalyzing) return;
      const td = new Float32Array(analyser.fftSize);
      analyser.getFloatTimeDomainData(td);
      let rms = 0; for (let i = 0; i < td.length; i++) rms += td[i]*td[i];
      rms = Math.sqrt(rms/td.length);
      if (rms > 0.005) {
        const res = essentiaChordDetectLive(td, audioCtx.sampleRate);
        if (res.confidence > 0.25) {
          voteBuffer.push(res); liveChord = res.chord; liveConf = res.confidence;
          document.getElementById('chordNowLabel').textContent = liveChord;
          document.getElementById('confFill').style.width = (liveConf*100).toFixed(0)+'%';
        }
      }
      const now = performance.now();
      if (now - lastBeatTime >= 60000/liveBPM) {
        // commit beat
        if (voteBuffer.length > 0) {
          const counts = {};
          let best = voteBuffer[0].chord, bc = 0;
          for (const v of voteBuffer) { counts[v.chord]=(counts[v.chord]||0)+1; if(counts[v.chord]>bc){bc=counts[v.chord];best=v.chord;} }
          beatTimeline.push({ chord: best, conf: voteBuffer[0].confidence });
        } else { beatTimeline.push({ chord: '-', conf: 0 }); }
        voteBuffer = [];
        lastBeatTime = now;
      }
      setTimeout(() => requestAnimationFrame(doLiveAnalysis), 93);
    }

    async function startCapture(type) {
      if (isAnalyzing) return;
      if (!essentiaReady) { log('Essentia 로딩 중...', 'warn'); return; }
      try {
        const stream = type === 'system'
          ? await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true })
          : await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new AudioContext();
        const src = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = FRAME_SIZE;
        analyser.smoothingTimeConstant = 0;
        src.connect(analyser);
        if (type === 'system') stream.getVideoTracks().forEach(t => t.stop());
        captureStream = stream;
        isAnalyzing = true;
        lastBeatTime = performance.now();
        hpcpBuf = []; stableChord = '-'; stableCount = 0; beatTimeline = []; voteBuffer = [];
        document.getElementById('btnStop').style.display = '';
        log(`${type === 'system' ? '시스템 오디오' : '마이크'} 캡처 시작`);
        doLiveAnalysis();
      } catch(e) { log('캡처 실패: ' + e.message, 'error'); }
    }

    function stopCapture() {
      isAnalyzing = false;
      if (captureStream) { captureStream.getTracks().forEach(t => t.stop()); captureStream = null; }
      document.getElementById('btnStop').style.display = 'none';
      log('캡처 중지');
    }

    // ══════════════════════════════════════════════════════
    // UI 이벤트
    // ══════════════════════════════════════════════════════

    // 탭 전환
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab' + btn.dataset.tab.charAt(0).toUpperCase() + btn.dataset.tab.slice(1)).classList.add('active');
      });
    });

    // 파일 업로드
    const fileDrop = document.getElementById('fileDrop');
    const fileInput = document.getElementById('fileInput');
    fileDrop.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); });
    fileDrop.addEventListener('dragover', (e) => { e.preventDefault(); fileDrop.classList.add('dragover'); });
    fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('dragover'));
    fileDrop.addEventListener('drop', (e) => {
      e.preventDefault(); fileDrop.classList.remove('dragover');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });

    // YouTube
    function extractId(url) { const m = url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/); return m ? m[1] : null; }
    document.getElementById('btnLoad').addEventListener('click', () => {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) return;
      const id = extractId(url);
      if (!id) { log('유효한 YouTube URL이 아닙니다', 'error'); return; }
      const wrapper = document.getElementById('playerWrapper');
      wrapper.className = 'player-wrapper';
      wrapper.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&enablejsapi=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
      log(`YouTube 로드: ${id}`, 'warn');
      log('"실시간" 탭에서 오디오 캡처로 분석 가능', 'warn');
    });
    document.querySelectorAll('.preset-btn').forEach(b => b.addEventListener('click', () => {
      document.getElementById('urlInput').value = `https://www.youtube.com/watch?v=${b.dataset.id}`;
      document.getElementById('btnLoad').click();
    }));

    // 실시간 캡처
    document.getElementById('btnSystem').addEventListener('click', () => startCapture('system'));
    document.getElementById('btnMic').addEventListener('click', () => startCapture('mic'));
    document.getElementById('btnStop').addEventListener('click', stopCapture);

    // BPM
    document.getElementById('bpmDn').addEventListener('click', () => {
      offlineBPM = Math.max(30, offlineBPM - 5);
      document.getElementById('bpmVal').textContent = offlineBPM;
      log(`BPM: ${offlineBPM}`, 'warn');
    });
    document.getElementById('bpmUp').addEventListener('click', () => {
      offlineBPM = Math.min(300, offlineBPM + 5);
      document.getElementById('bpmVal').textContent = offlineBPM;
      log(`BPM: ${offlineBPM}`, 'warn');
    });

    // 초기화
    loadEssentia();
    log('SyncChord v8 — 오프라인 분석 (Chordify 방식)');
    log('오디오 파일을 업로드하면 전체를 일괄 분석합니다');

    // Tab ID 매핑 수정
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        const tabName = btn.dataset.tab;
        const tabId = tabName === 'file' ? 'tabFile' : tabName === 'youtube' ? 'tabYoutube' : 'tabLive';
        document.getElementById(tabId).classList.add('active');
      });
    });
  </script>
</body>
