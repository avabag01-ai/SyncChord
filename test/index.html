<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyncChord — YouTube 실시간 코드 분석</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e1e1e1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      width: 100%;
      max-width: 900px;
    }
    h1 {
      font-size: 1.5rem;
      background: linear-gradient(135deg, #ff6b35, #f7c948);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-sub { color: #888; font-size: 0.85rem; }

    .url-bar {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 900px;
      margin-bottom: 12px;
    }
    .url-bar input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #3a3a5a;
      background: #1a1a2e;
      color: #e1e1e1;
      font-size: 0.9rem;
    }
    .url-bar input::placeholder { color: #666; }
    .url-bar button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #ff6b35, #e85d26);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .presets {
      display: flex;
      gap: 6px;
      width: 100%;
      max-width: 900px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .preset-btn {
      padding: 5px 12px;
      font-size: 0.75rem;
      border-radius: 14px;
      background: #111;
      border: 1px solid #2a2a4a;
      color: #aaa;
      cursor: pointer;
    }
    .preset-btn:hover { border-color: #ff6b35; color: #ff6b35; }

    .player-wrapper {
      position: relative;
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 12px 12px 0 0;
      overflow: hidden;
    }
    .player-wrapper iframe { width: 100%; height: 100%; border: none; }
    .placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #555; gap: 12px;
    }
    .placeholder-icon { font-size: 4rem; }

    /* ── Chordify-style 타임라인 ── */
    .chord-timeline-wrapper {
      width: 100%; max-width: 900px;
      background: #111118;
      border: 1px solid #2a2a4a;
      border-top: none;
      border-radius: 0 0 12px 12px;
      overflow: hidden;
    }
    .chord-info-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px;
      background: #16161e;
      border-bottom: 1px solid #222;
    }
    .chord-now {
      display: flex; align-items: center; gap: 12px;
    }
    .chord-now-label {
      font-size: 2rem; font-weight: 800;
      background: linear-gradient(135deg, #ff6b35, #f7c948);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      min-width: 60px; text-align: center;
      line-height: 1;
    }
    .chord-now-conf {
      height: 4px; width: 80px; background: #2a2a4a; border-radius: 2px; overflow: hidden;
    }
    .chord-now-conf-fill {
      height: 100%; background: linear-gradient(90deg, #ff6b35, #f7c948);
      width: 0%; transition: width 0.2s;
    }
    .chord-now-meta { display: flex; flex-direction: column; gap: 2px; }
    .chord-now-meta span { font-size: 0.65rem; color: #666; }
    .metro-mini {
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
    }
    .metro-dots { display: flex; gap: 5px; }
    .metro-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #2a2a4a; transition: all 0.08s;
    }
    .metro-dot.on {
      background: #f7c948;
      box-shadow: 0 0 8px rgba(247,201,72,0.6);
    }
    .bpm-label { font-size: 0.8rem; font-weight: 700; color: #f7c948; }
    .bpm-label small { font-weight: 400; color: #888; }
    .sync-badge {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 8px; border-radius: 14px;
      background: #1a1a2e; font-size: 0.7rem;
      color: #888; border: 1px solid #2a2a4a;
    }
    .sync-badge.connected { border-color: #4ade80; color: #4ade80; }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #555; }
    .sync-dot.on { background: #4ade80; }

    /* 타임라인 트랙 */
    .timeline-container {
      position: relative;
      height: 80px;
      overflow: hidden;
      user-select: none;
    }
    .timeline-track {
      display: flex;
      height: 100%;
      position: absolute; top: 0; left: 0;
      transition: transform 0.3s ease-out;
    }
    /* 플레이헤드: 왼쪽에서 25% 위치 고정 (미래 코드 미리보기) */
    .playhead {
      position: absolute;
      top: 0; bottom: 0;
      left: 25%;
      width: 3px;
      background: #ff6b35;
      z-index: 10;
      box-shadow: 0 0 8px rgba(255,107,53,0.6);
    }
    .playhead::before {
      content: ''; position: absolute;
      top: -4px; left: -5px;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 6px solid #ff6b35;
    }
    /* 비트 그리드 라인 */
    .beat-grid {
      position: absolute; top: 0; bottom: 0;
      width: 1px; background: rgba(255,255,255,0.06);
      z-index: 1;
    }
    .beat-grid.bar { background: rgba(255,255,255,0.12); }

    /* 코드 블록 (1 beat = 1 cell) */
    .chord-block {
      height: 100%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-weight: 700;
      font-size: 1rem;
      color: #bbb;
      border-right: 1px solid rgba(255,255,255,0.06);
      position: relative;
      transition: background 0.15s;
    }
    /* 마디 첫 박 (굵은 구분선) */
    .chord-block.bar-start {
      border-left: 2px solid rgba(255,255,255,0.18);
    }
    .chord-block .chord-label {
      z-index: 2; position: relative;
      padding: 3px 6px; border-radius: 4px;
      background: rgba(0,0,0,0.25);
      white-space: nowrap;
    }
    /* 같은 코드 연속 시 첫 번째만 이름 표시, 나머지는 점선 */
    .chord-block .chord-label.continuation {
      font-size: 0.7rem; opacity: 0.35; background: none;
    }
    .chord-block.past { opacity: 0.45; }
    .chord-block.current { opacity: 1; background: rgba(255,107,53,0.08); }
    .chord-block.current .chord-label {
      background: rgba(255,107,53,0.3);
      color: #fff; font-size: 1.15rem;
      box-shadow: 0 0 10px rgba(255,107,53,0.2);
    }
    .chord-block.future { opacity: 0.55; }
    .chord-block.future-empty { opacity: 0.25; }

    /* 코드별 색상 밴드 (상단 4px 색상 바) */
    .chord-block::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 4px;
    }
    .chord-block[data-root="C"]::before { background: #4ade80; }
    .chord-block[data-root="C#"]::before, .chord-block[data-root="Db"]::before { background: #22d3ee; }
    .chord-block[data-root="D"]::before { background: #60a5fa; }
    .chord-block[data-root="D#"]::before, .chord-block[data-root="Eb"]::before { background: #818cf8; }
    .chord-block[data-root="E"]::before { background: #a78bfa; }
    .chord-block[data-root="F"]::before { background: #c084fc; }
    .chord-block[data-root="F#"]::before, .chord-block[data-root="Gb"]::before { background: #e879f9; }
    .chord-block[data-root="G"]::before { background: #f472b6; }
    .chord-block[data-root="G#"]::before, .chord-block[data-root="Ab"]::before { background: #fb7185; }
    .chord-block[data-root="A"]::before { background: #f97316; }
    .chord-block[data-root="A#"]::before, .chord-block[data-root="Bb"]::before { background: #f59e0b; }
    .chord-block[data-root="B"]::before { background: #84cc16; }
    .chord-block[data-root="-"]::before { background: #333; }

    /* 하단 마디 번호 */
    .bar-numbers {
      display: flex; height: 18px;
      background: #0e0e14;
      border-top: 1px solid #222;
      font-size: 0.55rem; color: #555;
      overflow: hidden; position: relative;
    }
    .bar-num {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border-right: 1px solid rgba(255,255,255,0.04);
    }
    .bar-num.current { color: #ff6b35; font-weight: 700; }

    .bottom-panel {
      width: 100%; max-width: 900px;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; margin-top: 16px;
    }
    .panel-card {
      background: #1a1a2e; border: 1px solid #2a2a4a;
      border-radius: 12px; padding: 14px;
    }
    .panel-card h3 { font-size: 0.8rem; color: #f7c948; margin-bottom: 8px; }
    .ctrl-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    button {
      padding: 7px 12px; border-radius: 6px;
      border: 1px solid #3a3a5a; background: #2a2a4a;
      color: #e1e1e1; font-size: 0.8rem; cursor: pointer;
    }
    button:hover { border-color: #ff6b35; }
    button.primary {
      background: linear-gradient(135deg,#ff6b35,#e85d26);
      border-color: #ff6b35; color: #fff; font-weight: 600;
    }
    .room-input {
      padding: 7px 8px; border-radius: 6px;
      border: 1px solid #3a3a5a; background: #111;
      color: #e1e1e1; font-size: 0.8rem;
      width: 100px; text-align: center;
      letter-spacing: 3px; font-weight: 600;
    }
    .room-input::placeholder { letter-spacing: 0; font-weight: 400; }
    .status-row {
      display: flex; align-items: center; gap: 5px;
      margin-top: 8px; font-size: 0.7rem; color: #666;
    }
    .st-dot { width: 6px; height: 6px; border-radius: 50%; background: #555; }
    .st-dot.ok { background: #4ade80; }
    .st-dot.err { background: #f87171; }
    .users-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
    .user-chip {
      padding: 2px 8px; border-radius: 10px;
      background: #2a2a4a; font-size: 0.65rem;
    }
    .user-chip.host { border: 1px solid #f7c948; }
    .log-box {
      background: #111; border-radius: 6px; padding: 8px;
      max-height: 140px; overflow-y: auto;
      font-family: 'SF Mono','Fira Code',monospace;
      font-size: 0.7rem; line-height: 1.5; color: #666;
    }
    .log-box .info { color: #4ade80; }
    .log-box .warn { color: #f7c948; }
    .log-box .error { color: #f87171; }
  </style>
</head>
<body>
  <div class="header">
    <h1>SyncChord</h1>
    <span class="header-sub">YouTube 실시간 코드 인식 + 싱크 합주</span>
  </div>

  <div class="url-bar">
    <input type="text" id="urlInput" placeholder="YouTube URL 붙여넣기 (예: https://www.youtube.com/watch?v=...)">
    <button class="primary" id="btnLoad">▶ 분석 시작</button>
  </div>

  <div class="presets">
    <button class="preset-btn" data-id="kl0rqqhCU_s">🎤 김범수 - 보고싶다</button>
    <button class="preset-btn" data-id="5qap5aO4i9A">🎸 lofi hip hop</button>
    <button class="preset-btn" data-id="60ItHLz5WEA">🎵 Alan Walker - Faded</button>
    <button class="preset-btn" data-id="YQHsXMglC9A">🎶 Adele - Hello</button>
    <button class="preset-btn" data-id="LDU_Txk06tM">🎹 Jamiroquai</button>
  </div>

  <div class="player-wrapper" id="playerWrapper">
    <div class="placeholder">
      <div class="placeholder-icon">🎸</div>
      <div>YouTube URL을 입력하거나 프리셋을 클릭하세요</div>
    </div>
  </div>
  <div class="chord-timeline-wrapper">
    <!-- 상단 정보 바: 현재 코드 + BPM + 싱크 -->
    <div class="chord-info-bar">
      <div class="chord-now">
        <div class="chord-now-label" id="chordNowLabel">-</div>
        <div class="chord-now-meta">
          <span id="chordNowType">대기 중</span>
          <div class="chord-now-conf"><div class="chord-now-conf-fill" id="confFill"></div></div>
        </div>
      </div>
      <div class="metro-mini">
        <div class="metro-dots">
          <div class="metro-dot" id="md1"></div>
          <div class="metro-dot" id="md2"></div>
          <div class="metro-dot" id="md3"></div>
          <div class="metro-dot" id="md4"></div>
        </div>
        <div class="bpm-label"><span id="bpmVal">80</span> <small>BPM</small></div>
      </div>
      <div class="sync-badge" id="syncBadge">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncLabel">오프라인</span>
      </div>
    </div>
    <!-- 타임라인 트랙 -->
    <div class="timeline-container" id="timelineContainer">
      <div class="playhead"></div>
      <div class="timeline-track" id="timelineTrack"></div>
    </div>
    <!-- 마디 번호 -->
    <div class="bar-numbers" id="barNumbers"></div>
  </div>

  <div class="bottom-panel">
    <div class="panel-card">
      <h3>🎛 컨트롤</h3>
      <div class="ctrl-row">
        <button class="primary" id="btnSystem">🔊 오디오 캡처</button>
        <button id="btnMic">🎤 마이크</button>
        <button id="btnMetro">▶ 메트로놈</button>
        <button id="bpmDn">-5</button>
        <button id="bpmUp">+5</button>
      </div>
      <div class="ctrl-row" style="margin-top:8px">
        <button class="primary" id="btnCreate">방 만들기</button>
        <input class="room-input" id="roomInput" placeholder="코드" maxlength="6">
        <button id="btnJoin">참가</button>
      </div>
      <div class="status-row">
        <div class="st-dot" id="wasmDot"></div>
        <span id="wasmLabel">WASM 대기...</span>
      </div>
      <div class="users-row" id="usersList"></div>
    </div>
    <div class="panel-card">
      <h3>📋 로그</h3>
      <div class="log-box" id="logBox"></div>
    </div>
  </div>

  <script type="module">
    const logBox = document.getElementById('logBox');
    function log(msg, cls='info') {
      const t = new Date().toLocaleTimeString();
      logBox.innerHTML += `<div class="${cls}">[${t}] ${msg}</div>`;
      logBox.scrollTop = logBox.scrollHeight;
    }

    let wasm = null;
    async function loadWasm() {
      try {
        const mod = await import('../extension/wasm/syncchord_wasm.js');
        await mod.default();
        wasm = mod;
        document.getElementById('wasmDot').classList.add('ok');
        document.getElementById('wasmLabel').textContent = 'WASM 로드 완료';
        log('Rust WASM 엔진 로드 성공');
      } catch(e) {
        document.getElementById('wasmDot').classList.add('err');
        document.getElementById('wasmLabel').textContent = 'WASM 실패 (JS 폴백)';
        log('WASM 실패 — JS 폴백 사용','warn');
      }
    }

    // ══════════════════════════════════════════════════════════════════
    // 코드 인식 엔진 v3 — Essentia (MTG, UPF Barcelona) 알고리즘 이식
    // Pearson correlation + Krumhansl/Shaath profiles + harmonic weighting
    // 원본: essentia/src/algorithms/tonal/key.cpp (AGPL-3.0)
    // ══════════════════════════════════════════════════════════════════
    const KEYS=['A','Bb','B','C','C#','D','Eb','E','F','F#','G','Ab'];

    // ── Krumhansl key profiles (인지 실험 기반) ──
    const PROFILE_M = [6.35, 2.23, 3.48, 2.33, 4.38, 4.09, 2.52, 5.19, 2.39, 3.66, 2.29, 2.88]; // Major
    const PROFILE_m = [6.33, 2.68, 3.52, 5.38, 2.60, 3.53, 2.54, 4.75, 3.98, 2.69, 3.34, 3.17]; // Minor

    // ── Shaath profiles (팝/일렉 음악에 최적화) ──
    const SHAATH_M = [6.6, 2.0, 3.5, 2.3, 4.6, 4.0, 2.5, 5.2, 2.4, 3.7, 2.3, 3.4];
    const SHAATH_m = [6.5, 2.7, 3.5, 5.4, 2.6, 3.5, 2.5, 5.2, 4.0, 2.7, 4.3, 3.2];

    // 배음 기여도 (essentia addContributionHarmonics 이식)
    const NUM_HARMONICS = 4;
    const HARMONIC_SLOPE = 0.6;
    function addHarmonicContribution(pitchClass, weight, profile){
      for(let h = 1; h <= NUM_HARMONICS; h++){
        const idx = pitchClass + 12 * Math.log2(h);
        const before = Math.floor(idx) % 12;
        const after = Math.ceil(idx) % 12;
        const iBefore = ((before % 12) + 12) % 12;
        const iAfter = ((after % 12) + 12) % 12;
        const w = weight * Math.pow(HARMONIC_SLOPE, h - 1);
        if(iBefore === iAfter){
          profile[iBefore] += w;
        } else {
          const frac = idx - Math.floor(idx);
          profile[iBefore] += w * (1 - frac);
          profile[iAfter] += w * frac;
        }
      }
    }
    function addMajTriad(root, w, p){ addHarmonicContribution(root,w,p); addHarmonicContribution((root+4)%12,w,p); addHarmonicContribution((root+7)%12,w,p); }
    function addMinTriad(root, w, p){ addHarmonicContribution(root,w,p); addHarmonicContribution((root+3)%12,w,p); addHarmonicContribution((root+7)%12,w,p); }

    // 코드 프로파일 빌드 (essentia Key::configure 이식 — usePolyphony=true)
    function buildChordProfiles(M, m){
      const Mc = new Float64Array(12), mc = new Float64Array(12);
      // Major key chords: I(M) ii(m) iii(m) IV(M) V(M) vi(m) vii°
      addMajTriad(0, M[0], Mc); addMinTriad(2, M[2], Mc); addMinTriad(4, M[4], Mc);
      addMajTriad(5, M[5], Mc); addMajTriad(7, M[7], Mc); addMinTriad(9, M[9], Mc);
      addHarmonicContribution(11,M[11],Mc); addHarmonicContribution(2,M[11],Mc); addHarmonicContribution(5,M[11],Mc);
      // Minor key chords: i(m) ii° III(aug) iv(m) V(M) VI(M) vii°
      addMinTriad(0, m[0], mc);
      addHarmonicContribution(2,m[2],mc); addHarmonicContribution(5,m[2],mc); addHarmonicContribution(8,m[2],mc);
      addHarmonicContribution(3,m[3],mc); addHarmonicContribution(7,m[3],mc); addHarmonicContribution(11,m[3],mc);
      addMinTriad(5, m[5], mc); addMajTriad(7, m[7], mc); addMajTriad(8, m[8], mc);
      addHarmonicContribution(11,m[8],mc); addHarmonicContribution(2,m[8],mc); addHarmonicContribution(5,m[8],mc);
      return { major: Mc, minor: mc };
    }
    const PROFILES = buildChordProfiles(SHAATH_M, SHAATH_m);

    // ── Pearson correlation (essentia Key::correlation 이식) ──
    function pearsonCorr(v1, v2, shift){
      const n = v1.length;
      let sum1=0, sum2=0;
      for(let i=0;i<n;i++){ sum1+=v1[i]; sum2+=v2[((i-shift)%n+n)%n]; }
      const m1=sum1/n, m2=sum2/n;
      let std1=0, std2=0;
      for(let i=0;i<n;i++){ std1+=(v1[i]-m1)**2; std2+=(v2[((i-shift)%n+n)%n]-m2)**2; }
      std1=Math.sqrt(std1); std2=Math.sqrt(std2);
      if(std1<1e-10||std2<1e-10) return 0;
      let r=0;
      for(let i=0;i<n;i++) r += (v1[i]-m1)*(v2[((i-shift)%n+n)%n]-m2);
      return r/(std1*std2);
    }

    // ── HPCP 프레임 버퍼 (평균으로 안정성 확보) ──
    const HPCP_BUFFER_SIZE = 8; // ~240ms 분량의 HPCP 평균
    let hpcpBuffer = [];

    // ── 메인 코드 감지 (essentia Key::compute 이식) ──
    let stableChord = '-';
    const HYSTERESIS = 0.05;

    function essentiaChordDetect(hpcp){
      // HPCP 버퍼에 추가 + 평균 계산
      hpcpBuffer.push([...hpcp]);
      if(hpcpBuffer.length > HPCP_BUFFER_SIZE) hpcpBuffer.shift();
      const avgHpcp = new Float64Array(12);
      for(const frame of hpcpBuffer) for(let i=0;i<12;i++) avgHpcp[i]+=frame[i];
      const hlen = hpcpBuffer.length;
      for(let i=0;i<12;i++) avgHpcp[i]/=hlen;
      // 정규화
      const mx = Math.max(...avgHpcp, 1e-6);
      for(let i=0;i<12;i++) avgHpcp[i]/=mx;

      // 12 시프트 × 2 스케일 = 24 후보 (essentia와 동일)
      let bestKey=-1, bestScale='major', bestCorr=-2, secondCorr=-2;
      for(let shift=0; shift<12; shift++){
        const corrM = pearsonCorr(avgHpcp, Array.from(PROFILES.major), shift);
        const corrm = pearsonCorr(avgHpcp, Array.from(PROFILES.minor), shift);
        if(corrM > bestCorr){ secondCorr=bestCorr; bestCorr=corrM; bestKey=shift; bestScale='major'; }
        else if(corrM > secondCorr) secondCorr=corrM;
        if(corrm > bestCorr){ secondCorr=bestCorr; bestCorr=corrm; bestKey=shift; bestScale='minor'; }
        else if(corrm > secondCorr) secondCorr=corrm;
      }
      if(bestKey < 0) return { chord: '-', confidence: 0 };

      const chordName = KEYS[bestKey] + (bestScale==='minor' ? 'm' : '');
      const confidence = Math.max(0, bestCorr);
      const relStrength = bestCorr > 0 ? (bestCorr - secondCorr) / bestCorr : 0;

      // 히스테리시스: 현재 코드 유지 (relStrength가 낮으면 = 애매한 경우)
      if(stableChord !== '-' && relStrength < 0.15 && confidence < 0.7){
        return { chord: stableChord, confidence: confidence * 0.9 };
      }
      // 히스테리시스: 이전 코드와 비교
      if(stableChord !== '-' && stableChord !== chordName){
        // 이전 코드의 점수 체크
        const prevRoot = KEYS.indexOf(stableChord.replace(/m$/,''));
        const prevScale = stableChord.endsWith('m') ? 'minor' : 'major';
        const prevCorr = pearsonCorr(avgHpcp, Array.from(PROFILES[prevScale]), prevRoot);
        if(bestCorr - prevCorr < HYSTERESIS){
          return { chord: stableChord, confidence: prevCorr };
        }
      }
      stableChord = chordName;
      return { chord: chordName, confidence };
    }

    // ── HPCP 계산 (essentia HPCP 이식 — 대역별 가중치) ──
    function chromaFromDB(fftDB, sr){
      const hpcp = new Float64Array(12);
      const binHz = sr / (fftDB.length * 2);
      for(let i=1;i<fftDB.length;i++){
        const freq = i * binHz;
        if(freq < 40 || freq > 5000) continue;
        const db = fftDB[i];
        if(db < -60) continue;
        const power = Math.pow(10, (db + 60) / 20);
        const midi = 12 * Math.log2(freq / 440) + 69;
        const pc = ((Math.round(midi) % 12) + 12) % 12;
        // 대역별 가중치 (베이스 강화)
        let w = 1.0;
        if(freq < 250) w = 2.5;      // 베이스
        else if(freq < 500) w = 1.8;  // 저중음
        else if(freq < 1200) w = 1.2; // 중음
        else if(freq < 2500) w = 0.6; // 고음
        else w = 0.3;                  // 초고음 (배음)
        hpcp[pc] += power * w;
      }
      const mx = Math.max(...hpcp, 0.001);
      for(let i=0;i<12;i++) hpcp[i]/=mx;
      return { chroma: hpcp, bassChroma: null };
    }

    // ── 자동 BPM 감지 (onset energy, 느린 발라드~빠른 팝 전부 지원) ──
    let bpm = 80;  // 초기값을 80으로 (발라드 기본)
    let bpmLocked = false;
    let energyHistory = [];
    let onsetTimes = [];
    let bpmCandidates = []; // BPM 후보 누적 (안정적 감지)

    function detectBPMFromOnsets(){
      if(onsetTimes.length < 6) return;
      const intervals = [];
      for(let i = 1; i < onsetTimes.length; i++){
        const dt = onsetTimes[i] - onsetTimes[i-1];
        if(dt > 150 && dt < 3000) intervals.push(dt); // 20~400 BPM 범위 확대
      }
      if(intervals.length < 3) return;

      // IOI 히스토그램 (20ms 해상도)
      const hist = {};
      for(const dt of intervals){
        const bucket = Math.round(dt / 20) * 20;
        hist[bucket] = (hist[bucket] || 0) + 1;
      }

      // 상위 3개 후보 찾기
      const sorted = Object.entries(hist).sort((a,b) => b[1] - a[1]);
      if(sorted.length === 0) return;

      // 각 후보에 대해 BPM 계산, 배수/약수 관계 고려
      for(const [bucket, count] of sorted.slice(0, 3)){
        const ms = Number(bucket);
        if(ms < 150) continue;
        let candidateBPM = Math.round(60000 / ms);

        // 40-200 BPM 범위로 정규화
        while(candidateBPM < 40) candidateBPM *= 2;
        while(candidateBPM > 200) candidateBPM = Math.round(candidateBPM / 2);

        if(candidateBPM >= 40 && candidateBPM <= 200){
          bpmCandidates.push(candidateBPM);
        }
      }

      // 최근 20개 후보의 중앙값 사용 (안정적)
      if(bpmCandidates.length > 20) bpmCandidates = bpmCandidates.slice(-20);
      if(bpmCandidates.length >= 5 && !bpmLocked){
        const sorted = [...bpmCandidates].sort((a,b) => a - b);
        const median = sorted[Math.floor(sorted.length / 2)];

        // ±5 범위 내 가장 빈도 높은 값
        const nearby = bpmCandidates.filter(b => Math.abs(b - median) < 10);
        if(nearby.length >= 3){
          const avg = Math.round(nearby.reduce((a,b) => a+b, 0) / nearby.length);
          // 부드러운 전환
          const newBpm = Math.round(bpm * 0.6 + avg * 0.4);
          if(Math.abs(newBpm - bpm) >= 2){
            bpm = newBpm;
            document.getElementById('bpmVal').textContent = bpm;
            log(`🎵 BPM 감지: ${bpm}`, 'info');
          }
        }
      }
    }

    // ── Onset 감지 (에너지 기반, 민감도 조정) ──
    let prevEnergy = 0;
    let lastOnsetTime = 0;
    function detectOnset(fftDB){
      let energy = 0;
      for(let i = 0; i < fftDB.length; i++){
        if(fftDB[i] > -70) energy += Math.pow(10, fftDB[i] / 10);
      }
      const energyDB = 10 * Math.log10(energy + 1e-10);
      energyHistory.push(energyDB);
      if(energyHistory.length > 150) energyHistory.shift();

      const avg = energyHistory.reduce((a,b) => a + b, 0) / energyHistory.length;
      const threshold = avg + 2.5; // 2.5dB 이상 급상승
      const isOnset = energyDB > threshold && energyDB - prevEnergy > 1.5;
      prevEnergy = energyDB;

      if(isOnset){
        const now = performance.now();
        // 최소 간격 100ms (더블 onset 방지)
        if(now - lastOnsetTime > 100){
          onsetTimes.push(now);
          lastOnsetTime = now;
          while(onsetTimes.length > 0 && now - onsetTimes[0] > 15000){
            onsetTimes.shift();
          }
          if(onsetTimes.length % 3 === 0) detectBPMFromOnsets();
        }
      }
      return isOnset;
    }

    // ── 비트 싱크 ──
    let lastBeatTime = 0;
    let beatPhaseOffset = 0;

    function snapBeatToOnset(onsetTime){
      const beatMs = 60000 / bpm;
      const elapsed = onsetTime - lastBeatTime;
      const beatFraction = (elapsed % beatMs) / beatMs;
      if(beatFraction < 0.15 || beatFraction > 0.85){
        beatPhaseOffset = beatFraction < 0.5
          ? -beatFraction * beatMs * 0.3
          : (1 - beatFraction) * beatMs * 0.3;
      }
    }

    // ── Chordify 스타일 타임라인 ──
    let beatTimeline = [];
    let voteBuffer = [];
    let currentDisplayChord = '-';
    let currentBeatInBar = 0;
    let liveChord = '-';       // 실시간 코드 (비트 확정 전에 즉시 표시)
    let liveConf = 0;

    const BEAT_W = 56;
    const PLAYHEAD_PCT = 0.25;
    const BEATS_PER_BAR = 4;

    function chordRoot(name){
      if(!name || name === '-' || name === 'N/C') return '-';
      return name.replace(/m$/, '');
    }

    function commitBeat(){
      let chord = '-', conf = 0;
      if(voteBuffer.length > 0){
        // 투표: 가장 빈도 높은 코드 선택
        const counts = {};
        let bestChord = voteBuffer[0].chord, bestCount = 0, bestConf = 0;
        for(const v of voteBuffer){
          counts[v.chord] = (counts[v.chord] || 0) + 1;
          if(counts[v.chord] > bestCount || (counts[v.chord] === bestCount && v.confidence > bestConf)){
            bestCount = counts[v.chord];
            bestChord = v.chord;
            bestConf = v.confidence;
          }
        }
        chord = bestChord;
        conf = bestConf;

        // 안정성: 이전 박과 같은 코드면 confidence 보너스
        const prevBeat = beatTimeline.length > 0 ? beatTimeline[beatTimeline.length-1] : null;
        if(prevBeat && prevBeat.chord !== '-'){
          const prevCount = counts[prevBeat.chord] || 0;
          const prevRatio = prevCount / voteBuffer.length;
          // 이전 코드가 30% 이상 나왔고, 새 코드와 차이가 20% 미만이면 이전 코드 유지
          if(prevRatio > 0.3 && bestCount / voteBuffer.length - prevRatio < 0.2){
            chord = prevBeat.chord;
            conf = Math.max(conf, prevBeat.conf * 0.9);
          }
        }
      }
      beatTimeline.push({ chord, conf });
      currentDisplayChord = chord;
      currentBeatInBar = (beatTimeline.length - 1) % BEATS_PER_BAR;
      voteBuffer = [];
      renderTimeline(conf);
    }

    function renderTimeline(conf){
      const track = document.getElementById('timelineTrack');
      const container = document.getElementById('timelineContainer');
      const barRow = document.getElementById('barNumbers');
      const containerW = container.clientWidth;
      const totalBeats = beatTimeline.length;

      const futureBeats = Math.ceil(containerW * (1 - PLAYHEAD_PCT) / BEAT_W) + 4;
      const allBeats = totalBeats + futureBeats;

      let html = '';
      for(let i = 0; i < allBeats; i++){
        const isPast = i < totalBeats - 1;
        const isCurrent = i === totalBeats - 1;
        const isFuture = i >= totalBeats;
        const beatInBar = i % BEATS_PER_BAR;
        const isBarStart = beatInBar === 0;

        let cls = isCurrent ? 'current' : isPast ? 'past' : 'future-empty';
        if(isBarStart) cls += ' bar-start';

        if(isFuture){
          // 미래 셀: 첫 번째 미래 셀에 liveChord 미리보기
          const isNext = i === totalBeats;
          if(isNext && liveChord !== '-'){
            const root = chordRoot(liveChord);
            html += `<div class="chord-block future" data-root="${root}" style="width:${BEAT_W}px">
              <span class="chord-label">${liveChord}</span>
            </div>`;
          } else {
            html += `<div class="chord-block ${cls}" data-root="-" style="width:${BEAT_W}px">
              <span class="chord-label continuation">·</span>
            </div>`;
          }
        } else {
          const b = beatTimeline[i];
          const root = chordRoot(b.chord);
          const prevChord = i > 0 ? beatTimeline[i-1].chord : null;
          const isContinuation = !isBarStart && b.chord === prevChord && !isCurrent;
          const label = isContinuation
            ? `<span class="chord-label continuation">─</span>`
            : `<span class="chord-label">${b.chord}</span>`;
          html += `<div class="chord-block ${cls}" data-root="${root}" style="width:${BEAT_W}px">
            ${label}
          </div>`;
        }
      }
      track.innerHTML = html;

      const playheadX = containerW * PLAYHEAD_PCT;
      const currentCenter = (totalBeats - 0.5) * BEAT_W;
      const offset = currentCenter - playheadX;
      track.style.transform = `translateX(${-offset}px)`;

      let barHtml = '';
      for(let i = 0; i < allBeats; i++){
        const beatInBar = i % BEATS_PER_BAR;
        const barNum = Math.floor(i / BEATS_PER_BAR) + 1;
        const isCurr = i === totalBeats - 1;
        const txt = beatInBar === 0 ? `<b>${barNum}</b>` : `${beatInBar + 1}`;
        barHtml += `<div class="bar-num ${isCurr ? 'current' : ''}" style="width:${BEAT_W}px">${txt}</div>`;
      }
      barRow.innerHTML = barHtml;
      barRow.style.position = 'relative';
      barRow.style.transform = `translateX(${-offset}px)`;
      barRow.style.width = `${allBeats * BEAT_W}px`;

      // 상단 현재 코드 (즉시 반영 — liveChord 사용)
      const displayChord = liveChord !== '-' ? liveChord : currentDisplayChord;
      document.getElementById('chordNowLabel').textContent = displayChord;
      const type = displayChord.endsWith('m') ? 'minor' :
                   displayChord === '-' || displayChord === 'N/C' ? '' : 'major';
      document.getElementById('chordNowType').textContent =
        type ? `${type}  |  마디 ${Math.floor((totalBeats-1)/4)+1}  박 ${currentBeatInBar+1}  |  ${bpm} BPM`
             : `마디 ${Math.floor(Math.max(0,totalBeats-1)/4)+1}  |  ${bpm} BPM`;
      document.getElementById('confFill').style.width = `${(conf * 100).toFixed(0)}%`;

      for(let i = 1; i <= 4; i++){
        document.getElementById('md'+i).classList.toggle('on', i === currentBeatInBar + 1);
      }
    }

    // ── 분석 루프 (30ms 간격 고속 샘플링) ──
    let audioCtx,analyser,isAnalyzing=false;

    function doAnalysis(){
      if(!isAnalyzing)return;

      const timeDomain = new Float32Array(analyser.fftSize);
      analyser.getFloatTimeDomainData(timeDomain);
      const fftDB = new Float32Array(analyser.frequencyBinCount);
      analyser.getFloatFrequencyData(fftDB);

      // Onset 감지 → BPM 자동 계산 + 비트 위상 보정
      const isOnset = detectOnset(fftDB);
      if(isOnset) snapBeatToOnset(performance.now());

      // 코드 인식 (v3 — Essentia 알고리즘 이식)
      let res;
      const { chroma } = chromaFromDB(fftDB, audioCtx.sampleRate);
      res = essentiaChordDetect(chroma);

      // 즉시 라이브 코드 업데이트 (비트 확정 전에 미리 표시)
      if(res.confidence > 0.35){
        voteBuffer.push(res);
        liveChord = res.chord;
        liveConf = res.confidence;
        document.getElementById('chordNowLabel').textContent = liveChord;
        document.getElementById('confFill').style.width = `${(liveConf * 100).toFixed(0)}%`;
      }

      // 비트 타이머: BPM 기반 + 위상 보정
      const now = performance.now();
      const beatMs = 60000 / bpm;
      const adjusted = beatMs + beatPhaseOffset;
      if(now - lastBeatTime >= adjusted){
        commitBeat();
        lastBeatTime = now;
        beatPhaseOffset *= 0.5; // 위상 보정 점진적 감소
      }

      setTimeout(()=>requestAnimationFrame(doAnalysis), 30);
    }

    function extractId(url){const m=url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);return m?m[1]:null;}

    let captureStream = null;

    async function startSystemAudio(){
      if(isAnalyzing)return;
      try{
        captureStream = await navigator.mediaDevices.getDisplayMedia({
          video: true, audio: true
        });
        audioCtx=new AudioContext();
        const src=audioCtx.createMediaStreamSource(captureStream);
        analyser=audioCtx.createAnalyser();analyser.fftSize=4096;
        src.connect(analyser);
        captureStream.getVideoTracks().forEach(t=>t.stop());
        isAnalyzing=true;
        lastBeatTime = performance.now();
        // 초기화
        beatTimeline = []; voteBuffer = []; energyHistory = []; onsetTimes = [];
        prevEnergy = 0; beatPhaseOffset = 0; liveChord = '-';
        hpcpBuffer = []; stableChord = '-'; bpmCandidates = [];
        document.getElementById('btnSystem').textContent='⏹ 캡처 중지';
        log(`🔊 오디오 캡처 시작 — 자동 BPM 감지 중 (초기 ${bpm} BPM)`);
        doAnalysis();
        captureStream.getAudioTracks()[0].onended = ()=>{
          stopAnalysis();
          log('오디오 캡처 종료됨','warn');
        };
      }catch(e){
        log('오디오 캡처 실패: '+e.message,'error');
      }
    }

    async function startMic(){
      if(isAnalyzing)return;
      try{
        const stream=await navigator.mediaDevices.getUserMedia({audio:true});
        audioCtx=new AudioContext();
        const src=audioCtx.createMediaStreamSource(stream);
        analyser=audioCtx.createAnalyser();analyser.fftSize=4096;
        src.connect(analyser);isAnalyzing=true;
        lastBeatTime = performance.now();
        beatTimeline = []; voteBuffer = []; energyHistory = []; onsetTimes = [];
        prevEnergy = 0; beatPhaseOffset = 0; liveChord = '-';
        hpcpBuffer = []; stableChord = '-'; bpmCandidates = [];
        document.getElementById('btnMic').textContent='⏹ 중지';
        log(`🎤 마이크 캡처 시작 — 자동 BPM 감지 중 (초기 ${bpm} BPM)`);
        doAnalysis();
      }catch(e){log('마이크 실패: '+e.message,'error');}
    }

    function stopAnalysis(){
      isAnalyzing=false;
      if(captureStream){captureStream.getTracks().forEach(t=>t.stop());captureStream=null;}
      document.getElementById('btnSystem').textContent='🔊 오디오 캡처';
      document.getElementById('btnMic').textContent='🎤 마이크';
    }

    function loadVideo(id){
      document.getElementById('playerWrapper').innerHTML=
        `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&enablejsapi=1" allow="autoplay; encrypted-media; microphone" allowfullscreen></iframe>`;
      log(`YouTube 로드: ${id}`);
      log('💡 "오디오 캡처" 눌러서 코드 분석 시작 (헤드폰 OK)', 'warn');
    }

    document.getElementById('btnLoad').addEventListener('click',()=>{
      const url=document.getElementById('urlInput').value.trim();
      if(!url){log('URL을 입력하세요','warn');return;}
      const id=extractId(url);
      if(!id){log('유효한 YouTube URL이 아닙니다','error');return;}
      loadVideo(id);
    });
    document.getElementById('urlInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btnLoad').click();});
    document.querySelectorAll('.preset-btn').forEach(b=>b.addEventListener('click',()=>{
      const id=b.dataset.id;
      document.getElementById('urlInput').value=`https://www.youtube.com/watch?v=${id}`;
      loadVideo(id);
    }));

    document.getElementById('btnSystem').addEventListener('click',()=>{
      if(isAnalyzing){stopAnalysis();log('분석 중지');}
      else startSystemAudio();
    });
    document.getElementById('btnMic').addEventListener('click',()=>{
      if(isAnalyzing){stopAnalysis();log('분석 중지');}
      else startMic();
    });

    let metroInt=null,beat=0;
    function tick(){
      beat=(beat%4)+1;
      for(let i=1;i<=4;i++)document.getElementById('md'+i).classList.toggle('on',i===beat);
      const c=new AudioContext(),o=c.createOscillator(),g=c.createGain();
      o.frequency.value=beat===1?1000:800;g.gain.value=0.06;
      o.connect(g);g.connect(c.destination);o.start();
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.04);o.stop(c.currentTime+0.04);
    }
    document.getElementById('btnMetro').addEventListener('click',()=>{
      if(metroInt){clearInterval(metroInt);metroInt=null;document.getElementById('btnMetro').textContent='▶ 메트로놈';
        for(let i=1;i<=4;i++)document.getElementById('md'+i).classList.remove('on');beat=0;}
      else{metroInt=setInterval(tick,60000/bpm);document.getElementById('btnMetro').textContent='⏸ 정지';log(`메트로놈 ${bpm} BPM`);}
    });
    document.getElementById('bpmDn').addEventListener('click',()=>{bpm=Math.max(30,bpm-5);bpmLocked=true;document.getElementById('bpmVal').textContent=bpm;if(metroInt){clearInterval(metroInt);metroInt=setInterval(tick,60000/bpm);}log(`BPM 수동: ${bpm} (자동감지 잠금)`,'warn');});
    document.getElementById('bpmUp').addEventListener('click',()=>{bpm=Math.min(300,bpm+5);bpmLocked=true;document.getElementById('bpmVal').textContent=bpm;if(metroInt){clearInterval(metroInt);metroInt=setInterval(tick,60000/bpm);}log(`BPM 수동: ${bpm} (자동감지 잠금)`,'warn');});

    let ws=null,currentRoom=null;const userId='user_'+Math.random().toString(36).slice(2,8);
    function connectWS(){
      return new Promise((res,rej)=>{
        ws=new WebSocket('ws://localhost:8765');
        ws.onopen=()=>{document.getElementById('syncDot').classList.add('on');document.getElementById('syncLabel').textContent='연결됨';document.getElementById('syncBadge').classList.add('connected');log('WebSocket 연결됨');res();};
        ws.onmessage=e=>{const m=JSON.parse(e.data);
          if(m.type==='room_joined'){currentRoom=m.roomCode;bpm=m.bpm;document.getElementById('bpmVal').textContent=bpm;document.getElementById('syncLabel').textContent=`방 ${m.roomCode} (${m.users.length}명)`;log(`방 ${m.roomCode} — ${m.users.length}명`);renderUsers(m.users);}
          else if(m.type==='user_joined'||m.type==='user_left'){document.getElementById('syncLabel').textContent=`방 ${currentRoom} (${m.users.length}명)`;renderUsers(m.users);}
          else if(m.type==='bpm_update'){bpm=m.bpm;document.getElementById('bpmVal').textContent=bpm;}
          else if(m.type==='tick'){beat=m.beat;for(let i=1;i<=4;i++)document.getElementById('md'+i).classList.toggle('on',i===beat);}
          else if(m.type==='error')log(m.message,'error');
        };
        ws.onclose=()=>{document.getElementById('syncDot').classList.remove('on');document.getElementById('syncBadge').classList.remove('connected');document.getElementById('syncLabel').textContent='끊김';currentRoom=null;};
        ws.onerror=()=>{log('WebSocket 연결 실패','error');rej();};
      });
    }
    function renderUsers(u){document.getElementById('usersList').innerHTML=u.map(x=>`<div class="user-chip ${x.isHost?'host':''}">${x.isHost?'👑 ':''}${x.nickname}</div>`).join('');}
    document.getElementById('btnCreate').addEventListener('click',async()=>{try{if(!ws||ws.readyState!==1)await connectWS();const c=Math.random().toString(36).slice(2,8).toUpperCase();document.getElementById('roomInput').value=c;ws.send(JSON.stringify({type:'create_room',roomCode:c,userId,nickname:userId}));}catch{}});
    document.getElementById('btnJoin').addEventListener('click',async()=>{const c=document.getElementById('roomInput').value.trim();if(!c){log('방 코드를 입력하세요','warn');return;}try{if(!ws||ws.readyState!==1)await connectWS();ws.send(JSON.stringify({type:'join_room',roomCode:c,userId,nickname:userId}));}catch{}});

    loadWasm();
    log('SyncChord 준비 완료 — YouTube URL 또는 프리셋 클릭');
    log('💡 자동 BPM 감지 활성화 — 곡 템포에 맞춰 코드 표시');
  </script>
</body>
</html>
